#
# BLOAT OS Calamares Configuration
# This is a STRIPPED DOWN installer that only does base system installation.
# NO user creation, NO locale, NO keyboard, NO timezone.
# plasma-setup handles ALL of that on first boot.
---
modules-search: [ local ]

instances:
- id:       before
  module:   shellprocess
  config:   shellprocess-before.conf
- id:       final
  module:   shellprocess
  config:   shellprocess-final.conf

sequence:
- show:
  - welcome
  - partition
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - initcpiocfg
  - initcpio
  - removeuser
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - shellprocess@before
  - packages
  - grubcfg
  - bootloader
  - shellprocess@final
  - preservefiles
  - umount
- show:
  - finished

branding: bloatos

prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: false
quit-at-end: false
