# BLOAT OS Unpack Filesystem
# Unsquash the live filesystem to the target.
---
unpack:
    -   source: "/run/archiso/bootmnt/bloatos/x86_64/airootfs.sfs"
        sourcefs: "squashfs"
        destination: ""
    -   source: "/run/archiso/bootmnt/bloatos/boot/x86_64/vmlinuz-linux"
        sourcefs: "file"
        destination: "/boot/vmlinuz-linux"
