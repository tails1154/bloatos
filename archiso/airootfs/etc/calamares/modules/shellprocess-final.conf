#
# BLOAT OS Final Post-Install Script
# Runs after everything is installed.
# This is CRITICAL: enables plasma-setup for first boot.
---
script:
    # Enable plasma-setup service for first boot
    - "systemctl enable plasma-setup.service"

    # Enable SDDM display manager
    - "systemctl enable sddm.service"

    # Set BLOAT OS branding in plasma-setup
    - "mkdir -p /etc/xdg"
    - "echo '[General]' > /etc/xdg/plasmasetuprc"
    - "echo 'distroName=BLOAT OS' >> /etc/xdg/plasmasetuprc"
    - "echo 'UserGroups=wheel,audio,video,network,storage' >> /etc/xdg/plasmasetuprc"

    # Ensure /etc/plasma-setup-done does NOT exist so plasma-setup runs
    - "rm -f /etc/plasma-setup-done"

    # Create the bloat-install trigger file location
    - "mkdir -p /etc/bloatos"
    - "echo '# BLOAT OS post-setup configuration' > /etc/bloatos/bloat.conf"

    # Print success
    - "echo 'BLOAT OS base installation complete!'"
    - "echo 'On first boot, plasma-setup will guide you through setup.'"
    - "echo 'Then BLOAT INSTALL will add the ULTIMATE BLOAT!'"
