#
# BLOAT OS Welcome Module
# No GeoIP, no fancy requirements. Just install.
---
showSupportUrl:         false
showKnownIssuesUrl:     false
showReleaseNotesUrl:    false
showDonateUrl:          false

requirements:
    requiredStorage:    50
    requiredRam:        2.0
    internetCheckUrl:   http://example.com
    check:
        - storage
        - ram
        - power
        - screen
    required:
        - storage
        - ram

# No GeoIP - plasma-setup handles locale
geoip:
    style:    "none"
    url:      ""
    selector: ""
