# BLOAT OS Calamares Package Operations
# Installs core system packages into target.
# THE BLOAT is installed by bloatos-first-run on first login.
---
backend: pacman

skip_if_no_internet: false
update_db: true
update_system: true

pacman:
    num_retries: 3
    disable_download_timeout: false
    needed_only: false

operations:
  - remove:
    # Remove live-ISO-only packages
    - alci-calamares
    - alci-calamares-config
    - alci-calamares-dev
    - alci-calamares-config-dev
    - mkinitcpio-archiso
    - squashfs-tools
    - virtualbox-guest-utils
    - livecd-sounds
    - xorg-xinit
    - xorg-apps
    - xterm
    - xclip

  - install:
    # Core desktop environment
    - sddm
    - plasma-meta
    - plasma-workspace
    - plasma-desktop
    - plasma-setup-git
    - sddm-kcm
    - konsole
    - dolphin
    - kate
    - kde-gtk-config
    - plasma-nm
    - plasma-pa

    # Essential system tools
    - networkmanager
    - network-manager-applet
    - bash-completion
    - os-prober
    - make
    - git
    - base-devel
    - linux-headers

    # Graphics drivers (autodetect)
    - xf86-video-intel
    - xf86-video-amdgpu
    - xf86-video-nouveau
