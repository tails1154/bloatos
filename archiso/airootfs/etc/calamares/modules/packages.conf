#
# BLOAT OS Calamares Package Operations
# Removes live-only packages. Keeps ALL THE BLOAT.
---
backend: pacman

skip_if_no_internet: false
update_db: true
update_system: true

pacman:
    num_retries: 3
    disable_download_timeout: false
    needed_only: false

operations:
  - remove:
    # Live ISO only packages - REMOVE from installed system
    - alci-calamares
    - alci-calamares-config
    - alci-calamares-dev
    - alci-calamares-config-dev
    - alci-calamares-config-hardened
    - alci-calamares-config-lts
    - alci-calamares-config-pure
    - alci-calamares-config-xanmod
    - alci-calamares-config-zen
    - alci-dwm
    - alci-dwm-nemesis
    - mkinitcpio-archiso
    - squashfs-tools
    - virtualbox-guest-utils
    - livecd-sounds
    - xorg-xinit
    - xorg-apps
    - xorg-xkill
    - xterm
    - xclip

  - install:
    # Ensure plasma-setup is enabled on the installed system
    - sddm
    - plasma-setup-git
